services:
  db:
    image: postgres:16
    container_name: casa_empenos_db
    environment:
      POSTGRES_DB: casa_empenos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - casa_empenos_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: casa_empenos_redis
    ports:
      - "6379:6379"

volumes:
  casa_empenos_db_data:
